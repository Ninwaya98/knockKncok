<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knock Knock! 🚪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --scale: 1;
  --door-w: 240px;
  --door-h: 360px;
}

body {
  background: #ffffff;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ========== SCENE ========== */
.scene {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  position: relative;
  transform: scale(var(--scale));
  transform-origin: center center;
}

/* ========== TITLE ========== */
#title {
  font-family: 'Pacifico', cursive;
  font-size: 2.6rem;
  color: #E8704A;
  letter-spacing: 1px;
  animation: floatTitle 3s ease-in-out infinite;
  transition: opacity 0.4s;
  text-align: center;
}
@keyframes floatTitle {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-9px); }
}
#title.still { animation: none; }

/* ========== DOOR AREA ========== */
.door-area {
  position: relative;
  width: var(--door-w);
  height: var(--door-h);
}

.floor {
  position: absolute;
  bottom: -14px;
  left: -30px;
  width: 300px;
  height: 26px;
  background: linear-gradient(180deg, #D4A76A, #B8865A);
  border-radius: 8px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}

.door-frame {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #8B5E3C, #6B4020);
  border-radius: 18px 18px 0 0;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18), inset 0 2px 6px rgba(255,255,255,0.1);
}

.doorway {
  position: absolute;
  top: 12px;
  left: 12px;
  width: 216px;
  height: 336px;
  border-radius: 10px 10px 0 0;
  background: #15101f;
  overflow: hidden;
}

/* ========== CHARACTER ========== */
.character-wrap {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(calc(-50% + 150px));
  transition: transform 0.7s cubic-bezier(0.34, 1.15, 0.64, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 140px;
}
.character-wrap.peek { transform: translateX(calc(-50% + 70px)); }
.character-wrap.out  { transform: translateX(-50%); }
.character-wrap.gone { transform: translateX(calc(-50% + 170px)); }

/* Head */
.head {
  width: 108px;
  height: 108px;
  background: radial-gradient(circle at 40% 35%, #FFD08A, #F0A050);
  border-radius: 50%;
  position: relative;
  animation: bob 2.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* Curly hair */
.hair { position: absolute; top: -22px; left: -10px; width: 128px; height: 68px; }
.curl { position: absolute; background: #2C1A0E; border-radius: 50%; }
.c1 { width:34px; height:34px; top:10px; left:0;    }
.c2 { width:36px; height:36px; top:3px;  left:22px; }
.c3 { width:36px; height:36px; top:0;    left:46px; }
.c4 { width:36px; height:36px; top:3px;  left:68px; }
.c5 { width:34px; height:34px; top:10px; left:90px; }
.c6 { width:30px; height:30px; top:26px; left:8px;  }
.c7 { width:30px; height:30px; top:26px; left:88px; }
.c8 { width:26px; height:26px; top:38px; left:-5px; }
.c9 { width:26px; height:26px; top:38px; left:107px;}

/* Eyes */
.eyes { display:flex; justify-content:space-around; padding: 30px 16px 0; }
.eye {
  width: 24px; height: 24px;
  background: white;
  border-radius: 50%;
  position: relative;
  border: 1.5px solid #eee;
}
.eye::after {
  content: '';
  position: absolute;
  width: 13px; height: 13px;
  background: #222;
  border-radius: 50%;
  top: 5px; left: 5px;
  animation: blink 4.5s ease-in-out infinite;
}
@keyframes blink {
  0%,46%,54%,100% { transform: scaleY(1); }
  50%              { transform: scaleY(0.08); }
}
/* Angry brows */
.char-angry .eye::before {
  content: '';
  position: absolute;
  width: 22px; height: 5px;
  background: #2C1A0E;
  border-radius: 3px;
  top: -8px; left: -1px;
  transform: rotate(-18deg);
  transform-origin: right center;
}
/* Smirk */
.char-smirk .eye { overflow: hidden; }
.char-smirk .eye::after { top: 6px; }

/* Mouth */
.mouth {
  width: 52px; height: 26px;
  border-bottom: 5px solid #A0522D;
  border-radius: 0 0 34px 34px;
  margin: 8px auto 0;
  transition: all 0.4s;
}
.char-angry .mouth { width:42px; height:16px; border-radius:0 0 20px 20px; border-bottom-width:4px; }
.char-smirk .mouth { width:44px; border-radius:0 34px 34px 0; margin-left:18px; }

/* Blush */
.blush { position:absolute; width:18px; height:12px; background:rgba(255,120,100,0.35); border-radius:50%; bottom:26px; }
.blush.l { left:8px; }
.blush.r { right:8px; }

/* Body */
.body {
  width: 96px; height: 96px;
  background: linear-gradient(180deg, #5B9BD5, #3A78C9);
  border-radius: 44px 44px 14px 14px;
  position: relative;
  margin-top: -10px;
  flex-shrink: 0;
}
.body::before, .body::after {
  content: '';
  position: absolute;
  width: 24px; height: 68px;
  background: linear-gradient(180deg, #5B9BD5, #3A78C9);
  border-radius: 13px;
  top: 12px;
}
.body::before { left:-18px; transform:rotate(-12deg); transform-origin:top center; }
.body::after  { right:-18px; transform:rotate(12deg);  transform-origin:top center; }

/* Wave */
.waving .body::after {
  animation: wave 0.45s ease-in-out 3;
  transform-origin: top center;
}
@keyframes wave {
  0%,100% { transform: rotate(12deg); }
  50%      { transform: rotate(-30deg); }
}

/* Legs */
.legs { display:flex; gap:12px; margin-top:-3px; }
.leg {
  width: 28px; height: 70px;
  background: linear-gradient(180deg, #2E6CB0, #1A4C88);
  border-radius: 12px 12px 7px 7px;
  position: relative;
  transform-origin: top center;
}
.leg::after {
  content: '';
  position: absolute;
  bottom: -12px; left: -7px;
  width: 42px; height: 16px;
  background: #1a1a1a;
  border-radius: 10px 10px 6px 6px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.35);
}

/* Walk */
@keyframes walkL {
  0%,100% { transform: rotate(0deg); }
  25%      { transform: rotate(-22deg); }
  75%      { transform: rotate(22deg); }
}
@keyframes walkR {
  0%,100% { transform: rotate(0deg); }
  25%      { transform: rotate(22deg); }
  75%      { transform: rotate(-22deg); }
}
.character-wrap.walking .leg:first-child { animation: walkL 0.38s ease-in-out 3; }
.character-wrap.walking .leg:last-child  { animation: walkR 0.38s ease-in-out 3; }

/* ========== DOOR ========== */
.door {
  position: absolute;
  top: 12px; left: 12px;
  width: 216px; height: 336px;
  background: linear-gradient(130deg, #C8864A 0%, #A36030 45%, #C07840 100%);
  border-radius: 10px 10px 0 0;
  cursor: pointer;
  transform-origin: left center;
  transition: transform 1s cubic-bezier(0.4,0,0.2,1);
  z-index: 10;
  box-shadow: inset -8px 0 20px rgba(0,0,0,0.2), inset 3px 0 8px rgba(255,255,255,0.1);
  touch-action: manipulation;
}
.door.open      { transform: perspective(900px) rotateY(-72deg); }
.door.open-fast { transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
.door.crack     { transform: perspective(900px) rotateY(-14deg); }
.door.close-fast{ transition: transform 0.22s cubic-bezier(0.4,0,0.2,1); }
.door::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: repeating-linear-gradient(180deg, transparent, transparent 18px, rgba(0,0,0,0.04) 18px, rgba(0,0,0,0.04) 19px);
}

.panel {
  position: absolute;
  border: 5px solid rgba(0,0,0,0.13);
  border-radius: 7px;
  background: rgba(255,255,255,0.04);
  box-shadow: inset 2px 2px 6px rgba(255,255,255,0.15), inset -2px -2px 4px rgba(0,0,0,0.1);
}
.p1 { top:28px;    left:22px;  width:76px; height:100px; }
.p2 { top:28px;    right:22px; width:76px; height:100px; }
.p3 { bottom:60px; left:22px;  width:76px; height:100px; }
.p4 { bottom:60px; right:22px; width:76px; height:100px; }

.knob {
  position: absolute;
  right: 24px; top: 50%;
  transform: translateY(-50%);
  width: 24px; height: 24px;
  background: radial-gradient(circle at 35% 35%, #FFE066, #B8860B);
  border-radius: 50%;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}
.knob::after {
  content: '';
  position: absolute;
  width: 5px; height: 14px;
  background: #8B6914;
  border-radius: 3px;
  top: 26px; left: 50%; transform: translateX(-50%);
}

/* Door shake */
@keyframes shake {
  0%,100% { margin-left:0; }
  20%      { margin-left:-8px; }
  40%      { margin-left:8px; }
  60%      { margin-left:-5px; }
  80%      { margin-left:5px; }
}
.door-frame.shaking { animation: shake 0.35s ease; }

/* ========== SPEECH BUBBLE ========== */
#bubble {
  position: absolute;
  top: 24px;
  right: -292px;
  width: 270px;
  background: white;
  border: 2px solid #e8e8e8;
  border-radius: 20px;
  padding: 14px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.6;
  color: #333;
  box-shadow: 0 8px 32px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.06);
  opacity: 0;
  pointer-events: none;
  transform: scale(0.85) translateX(-10px);
  transform-origin: left center;
  transition: opacity 0.25s, transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
  z-index: 30;
}
#bubble.show {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1) translateX(0);
}
#bubble::before {
  content: '';
  position: absolute;
  left: -14px; top: 22px;
  border: 7px solid transparent;
  border-right-color: #e8e8e8;
}
#bubble::after {
  content: '';
  position: absolute;
  left: -10px; top: 24px;
  border: 5px solid transparent;
  border-right-color: white;
}

/* Mobile bubble: drop below the door */
@media (max-width: 640px) {
  #bubble {
    position: fixed;
    right: auto; top: auto;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    transform-origin: bottom center;
    width: min(320px, calc(100vw - 32px));
  }
  #bubble.show {
    transform: translateX(-50%) scale(1);
  }
  #bubble::before, #bubble::after { display: none; }
}

/* ========== KNOCK DOTS ========== */
.dots { display:flex; gap:12px; }
.dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #eee;
  border: 2px solid #ddd;
  transition: background 0.25s, transform 0.2s;
}
.dot.lit { background: #E8704A; border-color: #C05030; transform: scale(1.45); }

/* ========== HINT ========== */
#hint {
  font-size: 0.95rem;
  font-weight: 600;
  color: #c0b8b0;
  text-align: center;
  letter-spacing: 0.3px;
  animation: pulse 2.4s ease-in-out infinite;
  transition: opacity 0.5s;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ========== CONTROLS (fixed height — door never moves) ========== */
.controls {
  height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 10px;
  padding-top: 4px;
}

/* ========== NEXT BUTTON ========== */
#nextBtn {
  background: #E8704A;
  color: white;
  border: none;
  border-radius: 30px;
  padding: 12px 34px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(232,112,74,0.38);
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.2s, transform 0.12s, box-shadow 0.15s, background 0.2s;
  touch-action: manipulation;
}
#nextBtn.visible {
  visibility: visible;
  opacity: 1;
  animation: popBtn 0.35s cubic-bezier(0.34,1.5,0.64,1) both;
}
@keyframes popBtn {
  from { opacity:0; transform: scale(0.7); }
  to   { opacity:1; transform: scale(1); }
}
#nextBtn:hover  { background:#D4603A; transform:translateY(-2px); box-shadow:0 6px 22px rgba(232,112,74,0.45); }
#nextBtn:active { transform:translateY(2px); box-shadow:0 2px 8px rgba(232,112,74,0.3); }

/* ========== STATUS ========== */
#status {
  font-size: 0.9rem;
  color: #c0b8b0;
  text-align: center;
  max-width: 280px;
  opacity: 0;
  transition: opacity 0.5s;
  font-weight: 600;
}
#status.show { opacity: 1; }

/* ========== CONFETTI ========== */
.confetti-piece {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  border-radius: 2px;
  animation: confettiFly var(--dur) ease-out var(--delay) both;
}
@keyframes confettiFly {
  0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div id="title">Knock Knock! 🚪</div>

  <div class="door-area">
    <div class="floor"></div>

    <div class="door-frame" id="doorFrame">
      <div class="doorway">
        <div class="character-wrap gone" id="charWrap">
          <div class="head">
            <div class="hair">
              <div class="curl c1"></div><div class="curl c2"></div>
              <div class="curl c3"></div><div class="curl c4"></div>
              <div class="curl c5"></div><div class="curl c6"></div>
              <div class="curl c7"></div><div class="curl c8"></div>
              <div class="curl c9"></div>
            </div>
            <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
            <div class="mouth"></div>
            <div class="blush l"></div>
            <div class="blush r"></div>
          </div>
          <div class="body" id="body"></div>
          <div class="legs">
            <div class="leg"></div>
            <div class="leg"></div>
          </div>
        </div>
      </div>

      <div id="bubble"></div>

      <div class="door" id="door">
        <div class="panel p1"></div><div class="panel p2"></div>
        <div class="panel p3"></div><div class="panel p4"></div>
        <div class="knob"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="dots"><div class="dot" id="d1"></div><div class="dot" id="d2"></div></div>
    <div id="hint">tap the door twice 👆</div>
    <button id="nextBtn">Next →</button>
    <div id="status"></div>
  </div>
</div>

<script>
// ── DOM ───────────────────────────────────────────────
const door      = document.getElementById('door');
const doorFrame = document.getElementById('doorFrame');
const charWrap  = document.getElementById('charWrap');
const bubble    = document.getElementById('bubble');
const titleEl   = document.getElementById('title');
const hintEl    = document.getElementById('hint');
const nextBtn   = document.getElementById('nextBtn');
const d1        = document.getElementById('d1');
const d2        = document.getElementById('d2');
const statusEl  = document.getElementById('status');
const sceneEl   = document.getElementById('scene');

// ── RESPONSIVE SCALING ────────────────────────────────
function applyScale() {
  // Scene natural width ≈ 240px door + 292px bubble right = ~600px
  // Scene natural height ≈ 60+20+360+20+14+20+20+20+44 ≈ 580px
  const SCENE_W = 620, SCENE_H = 600;
  const pad = 24;
  const sw = (window.innerWidth  - pad) / SCENE_W;
  const sh = (window.innerHeight - pad) / SCENE_H;
  // On narrow screens (mobile), only constrain by width; bubble goes below
  const isMobile = window.innerWidth < 640;
  const scale = isMobile ? Math.min(1, (window.innerWidth - pad) / 260) : Math.min(1, sw, sh);
  sceneEl.style.setProperty('--scale', scale);
}
applyScale();
window.addEventListener('resize', applyScale);

// ── STATE ─────────────────────────────────────────────
let knockCount  = 0;
let visitCount  = 0;
let dialogIdx   = 0;
let isAnimating = false;
let isTyping    = false;
let typeTimer   = null;
let locked      = false;

// ── CONVERSATIONS ─────────────────────────────────────
const convos = [
  [
    { text: "Oh! It's YOU! 👀",                                             action: 'peek'      },
    { text: "Hi sister! How are you? 😄",                                   action: 'walk-out'  },
    { text: "Sooo... I made this website. Like, actually built it myself!", action: null        },
    { text: "Pretty cool right? I'm basically a developer now 😎",           action: null        },
    { text: "I'm learning how to code and build things on the internet!",    action: null        },
    { text: "Who knows... maybe next time I'll build you an actual app 🚀",  action: null        },
    { text: "Anyway, I just wanted to show you this. Love you! ❤️",         action: null        },
    { text: "Okay okay, I need to go back to work now... bye!",              action: 'leave'     },
  ],
  [
    { text: "Hey! I told you, I'm WORKING! 😤",            action: 'peek-angry' },
    { text: "...okay fine, it was nice seeing you too 😏",  action: 'smirk'      },
    { text: "Now go away! I have code to write! 💻",        action: 'slam'       },
  ],
  [
    { text: "...",            action: 'eyes' },
    { text: "I'm not here.", action: 'eyes-slam' },
  ],
];

// ── HELPERS ───────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

function _audioCtx() {
  return new (window.AudioContext || window.webkitAudioContext)();
}

function _noiseBuffer(ctx, seconds) {
  const len = Math.ceil(ctx.sampleRate * seconds);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function playKnock() {
  try {
    const ctx = _audioCtx();
    // Two knuckle raps, slightly uneven like a real knock
    [0, 0.21].forEach((delay, i) => {
      const t = ctx.currentTime + delay;
      const hard = i === 0; // first hit slightly harder

      // ── Layer 1: woody crack (bandpass-filtered noise) ──
      const ns = ctx.createBufferSource();
      ns.buffer = _noiseBuffer(ctx, 0.25);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 420;
      bp.Q.value = 1.0;
      const nsGain = ctx.createGain();
      nsGain.gain.setValueAtTime(hard ? 3.5 : 2.8, t);
      nsGain.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      ns.connect(bp); bp.connect(nsGain); nsGain.connect(ctx.destination);
      ns.start(t); ns.stop(t + 0.18);

      // ── Layer 2: body thump (low sine, door mass resonance) ──
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(hard ? 130 : 110, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.14);
      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(hard ? 1.2 : 0.9, t);
      oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.connect(oscGain); oscGain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.2);

      // ── Layer 3: high transient click (knuckle bone impact) ──
      const click = ctx.createOscillator();
      click.type = 'triangle';
      click.frequency.setValueAtTime(1800, t);
      click.frequency.exponentialRampToValueAtTime(400, t + 0.03);
      const clickGain = ctx.createGain();
      clickGain.gain.setValueAtTime(0.4, t);
      clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      click.connect(clickGain); clickGain.connect(ctx.destination);
      click.start(t); click.stop(t + 0.04);
    });
  } catch(e) {}
}

function playCreak() {
  try {
    const ctx = _audioCtx();
    const t = ctx.currentTime;
    const dur = 1.3;

    // ── Oscillator sweep: sawtooth through resonant filter ──
    // Irregular frequency curve = natural creak character
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(190, t);
    osc.frequency.linearRampToValueAtTime(340, t + 0.12);
    osc.frequency.linearRampToValueAtTime(240, t + 0.28);
    osc.frequency.linearRampToValueAtTime(310, t + 0.46);
    osc.frequency.linearRampToValueAtTime(170, t + 0.65);
    osc.frequency.linearRampToValueAtTime(210, t + 0.85);
    osc.frequency.linearRampToValueAtTime(130, t + dur);

    // Tight bandpass makes it "creak" instead of "buzz"
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 260;
    bp.Q.value = 6;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.28, t + 0.07);
    gain.gain.setValueAtTime(0.24, t + 0.9);
    gain.gain.linearRampToValueAtTime(0, t + dur);

    osc.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + dur);

    // ── Texture noise: wood grain friction ──
    const ns = ctx.createBufferSource();
    ns.buffer = _noiseBuffer(ctx, dur);
    const nf = ctx.createBiquadFilter();
    nf.type = 'bandpass';
    nf.frequency.value = 380;
    nf.Q.value = 2.5;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.05, t);
    ng.gain.linearRampToValueAtTime(0.08, t + 0.3);
    ng.gain.linearRampToValueAtTime(0, t + dur);
    ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
    ns.start(t); ns.stop(t + dur);
  } catch(e) {}
}

function playSlam() {
  try {
    const ctx = _audioCtx();
    const t = ctx.currentTime;

    // Heavy low thud
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, t);
    osc.frequency.exponentialRampToValueAtTime(35, t + 0.25);
    const oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(2.0, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(oscGain); oscGain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.3);

    // Crack noise burst
    const ns = ctx.createBufferSource();
    ns.buffer = _noiseBuffer(ctx, 0.3);
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.8;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(4.0, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
    ns.start(t); ns.stop(t + 0.25);
  } catch(e) {}
}

function shakeDoor() {
  doorFrame.classList.remove('shaking');
  void doorFrame.offsetWidth;
  doorFrame.classList.add('shaking');
  doorFrame.addEventListener('animationend', () => doorFrame.classList.remove('shaking'), {once:true});
}

async function openDoor(mode = 'normal') {
  door.className = 'door';
  if (mode === 'fast') door.classList.add('open-fast');
  await sleep(10);
  playCreak();
  door.classList.add('open');
  return sleep(mode === 'fast' ? 480 : 1050);
}

async function closeDoor(mode = 'normal') {
  door.classList.remove('open','crack');
  if (mode === 'slam') {
    door.classList.add('close-fast');
    await sleep(50); playSlam();
  }
  return sleep(mode === 'slam' ? 280 : 850);
}

async function crackDoor() {
  door.className = 'door crack';
  return sleep(400);
}

function getMood() {
  return charWrap.classList.contains('char-angry') ? 'char-angry'
       : charWrap.classList.contains('char-smirk') ? 'char-smirk' : '';
}

function setChar(state) {
  const mood = getMood();
  charWrap.className = 'character-wrap ' + state + (mood ? ' ' + mood : '');
}

async function walkOut() {
  const mood = getMood();
  charWrap.className = 'character-wrap out walking' + (mood ? ' ' + mood : '');
  await sleep(1200);
  charWrap.classList.remove('walking');
}

function setMood(mood) {
  charWrap.classList.remove('char-angry','char-smirk');
  if (mood === 'angry') charWrap.classList.add('char-angry');
  if (mood === 'smirk') charWrap.classList.add('char-smirk');
}

function typewriter(text, speed = 38) {
  return new Promise(resolve => {
    bubble.textContent = '';
    isTyping = true;
    const chars = [...text];
    let i = 0;
    typeTimer = setInterval(() => {
      if (i < chars.length) { bubble.textContent += chars[i++]; }
      else { clearInterval(typeTimer); isTyping = false; resolve(); }
    }, speed);
  });
}

function showBubble(text) {
  bubble.classList.add('show');
  return typewriter(text);
}

function hideBubble() {
  bubble.classList.remove('show');
  bubble.textContent = '';
  clearInterval(typeTimer);
  isTyping = false;
}

function showNext() {
  nextBtn.classList.remove('visible');
  void nextBtn.offsetWidth; // reflow to re-trigger animation
  nextBtn.classList.add('visible');
}
function hideNext() { nextBtn.classList.remove('visible'); }

function dotReset()  { d1.classList.remove('lit'); d2.classList.remove('lit'); }
function dotLight(n) { if(n>=1) d1.classList.add('lit'); if(n>=2) d2.classList.add('lit'); }
function setHint(text) { hintEl.textContent = text; hintEl.style.opacity = text ? '1' : '0'; }
function setStatus(text) { statusEl.textContent = text; statusEl.classList.toggle('show', !!text); }

// ── CONFETTI ──────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#E8704A','#F9C784','#5B9BD5','#84D8A8','#FFB347','#C779D0','#FF6B6B','#FFE66D'];
  const shapes = ['circle', 'square', 'rect'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.42;

  for (let i = 0; i < 72; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';

    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const size  = 6 + Math.random() * 10;
    const color = colors[Math.floor(Math.random() * colors.length)];

    const angle  = Math.random() * Math.PI * 2;
    const dist   = 80 + Math.random() * 260;
    const tx     = Math.cos(angle) * dist;
    const ty     = Math.sin(angle) * dist - 80;
    const rot    = (Math.random() - 0.5) * 900;
    const dur    = 0.9 + Math.random() * 1.1;
    const delay  = Math.random() * 0.3;

    el.style.cssText = `
      left: ${cx}px;
      top: ${cy}px;
      width: ${shape === 'rect' ? size * 2 : size}px;
      height: ${size}px;
      background: ${color};
      border-radius: ${shape === 'circle' ? '50%' : shape === 'rect' ? '2px' : '2px'};
      --tx: ${tx}px;
      --ty: ${ty}px;
      --rot: ${rot}deg;
      --dur: ${dur}s;
      --delay: ${delay}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay + 0.2) * 1000);
  }
}

// ── RAPID KNOCK DETECTION ─────────────────────────────
let rapidCount = 0;
let rapidTimer = null;
const angryPops = [
  "Are you SERIOUS right now?! 😤",
  "I can HEAR you knocking!! 😡",
  "GO AWAYYYY I'm working!! 🚫",
  "DO YOU MIND?! 😤💢",
  "I swear if you knock one more time... 😠",
];
let angryPopIdx = 0;

async function triggerAngryPop() {
  isAnimating = true;
  const msg = angryPops[angryPopIdx % angryPops.length];
  angryPopIdx++;

  door.className = 'door crack';
  playCreak();
  await sleep(250);
  setChar('peek');
  setMood('angry');
  await sleep(250);
  await showBubble(msg);
  await sleep(1400);
  hideBubble();
  setChar('gone');
  await sleep(280);
  door.classList.remove('crack');
  door.classList.add('close-fast');
  await sleep(50); playSlam();
  await sleep(250);
  door.className = 'door';
  isAnimating = false;
}

function trackRapid() {
  rapidCount++;
  clearTimeout(rapidTimer);
  rapidTimer = setTimeout(() => { rapidCount = 0; }, 1800);
  if (rapidCount >= 4 && !isAnimating) {
    rapidCount = 0;
    clearTimeout(rapidTimer);
    triggerAngryPop();
    return true;
  }
  return false;
}

// ── MAIN KNOCK HANDLER ────────────────────────────────
async function handleKnock() {
  if (isAnimating) return;

  // Rapid-knock check fires before everything else
  if (trackRapid()) return;

  if (locked) { playKnock(); shakeDoor(); setStatus("He's really working now... come back later 😄"); return; }

  playKnock();
  shakeDoor();
  knockCount++;
  dotLight(knockCount);
  if (knockCount < 2) return;

  knockCount = 0;
  dotReset();
  isAnimating = true;
  setHint('');
  setStatus('');
  titleEl.classList.add('still');
  titleEl.style.opacity = '0.4';
  await runVisit();
}

async function runVisit() {
  const idx   = Math.min(visitCount, convos.length - 1);
  const convo = convos[idx];
  dialogIdx   = 0;
  visitCount++;

  // Visit 3: just eyes through crack
  if (idx === 2) {
    await crackDoor();
    setChar('out'); setMood('happy');
    await sleep(400);
    await showBubble(convo[0].text);
    await sleep(1300);
    hideBubble();
    await sleep(300);
    await showBubble(convo[1].text);
    await sleep(1500);
    hideBubble();
    setChar('gone');
    await sleep(350);
    await closeDoor('slam');
    locked = true;
    isAnimating = false;
    titleEl.classList.remove('still');
    titleEl.style.opacity = '1';
    setStatus("He's really working now... come back later 😄");
    return;
  }

  await openDoor(visitCount > 1 ? 'fast' : 'normal');
  await playLine(convo);
}

async function playLine(convo) {
  const line = convo[dialogIdx];

  if (line.action === 'peek' || line.action === 'peek-angry') {
    setChar('peek');
    setMood(line.action === 'peek-angry' ? 'angry' : 'happy');
  } else if (line.action === 'smirk') {
    setChar('out'); setMood('smirk');
  } else if (line.action === 'walk-out') {
    setMood('happy');
    // First reveal — shoot confetti!
    if (visitCount === 1) spawnConfetti();
    await walkOut();
  }

  await sleep(200);
  await showBubble(line.text);

  if (line.action === 'leave') {
    await sleep(1700);
    charWrap.classList.add('waving');
    await sleep(1400);
    charWrap.classList.remove('waving');
    hideBubble();
    charWrap.classList.add('walking');
    setChar('gone');
    await sleep(900);
    charWrap.classList.remove('walking');
    await closeDoor('normal');
    await afterVisit();
    return;
  }

  if (line.action === 'slam') {
    await sleep(1400);
    hideBubble();
    setChar('gone');
    await sleep(380);
    await closeDoor('slam');
    await afterVisit();
    return;
  }

  showNext();
}

async function advanceDialog() {
  if (isTyping) {
    clearInterval(typeTimer);
    isTyping = false;
    const idx = Math.min(visitCount - 1, convos.length - 1);
    bubble.textContent = convos[idx][dialogIdx].text;
    return;
  }

  hideNext();
  hideBubble();
  dialogIdx++;

  const idx   = Math.min(visitCount - 1, convos.length - 1);
  const convo = convos[idx];
  if (dialogIdx >= convo.length) { await afterVisit(); return; }

  const line = convo[dialogIdx];

  if (line.action === 'walk-out') {
    setMood('happy'); await walkOut();
  } else if (line.action === null || line.action === 'out') {
    setChar('out'); setMood('happy'); await sleep(300);
  } else if (line.action === 'smirk') {
    setChar('out'); setMood('smirk'); await sleep(300);
  }

  await playLine(convo);
}

async function afterVisit() {
  hideNext();
  hideBubble();
  setMood('happy');
  isAnimating = false;
  titleEl.classList.remove('still');
  titleEl.style.opacity = '1';

  if (visitCount === 1)      { titleEl.textContent = 'Knock Knock! 🚪'; setHint('tap the door twice 👆'); }
  else if (visitCount === 2) { titleEl.textContent = 'Knock Knock... 🚪'; setHint('...really? again? 😅'); }
  else                       { titleEl.textContent = 'Knock Knock? 🚪'; setHint(''); }
  setStatus('');
}

// ── EVENTS ────────────────────────────────────────────
door.addEventListener('click', handleKnock);
door.addEventListener('touchend', e => { e.preventDefault(); handleKnock(); });
nextBtn.addEventListener('click', advanceDialog);
bubble.addEventListener('click', () => {
  if (isTyping || nextBtn.classList.contains('visible')) advanceDialog();
});
</script>
